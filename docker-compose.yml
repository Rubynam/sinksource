version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: sink-connect-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel notice
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - kafka-network

volumes:
  redis-data:
    driver: local

networks:
  kafka-network:
    driver: bridge