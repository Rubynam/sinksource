# Apache Pekko Configuration for Alert System
# This file configures Apache Pekko Persistence with Cassandra plugin

pekko {
  actor {
    provider = "cluster"

    # Serialization configuration
    serialization-bindings {
      "com.example.sinkconnect.domain.logic.alert.actor.AlertEvent" = jackson-json
      "com.example.sinkconnect.domain.logic.alert.actor.AlertCommand" = jackson-json
      "com.example.sinkconnect.domain.logic.alert.actor.AlertState" = jackson-json
      "com.example.sinkconnect.domain.logic.alert.actor.AlertManagerActor$Command" = jackson-json
    }

    # Allow Java serialization for some internal Pekko messages
    allow-java-serialization = on
    warn-about-java-serializer-usage = off
  }

  # Cluster configuration
  cluster {
    seed-nodes = ["pekko://AlertSystem@127.0.0.1:2551"]

    # Sharding configuration
    sharding {
      number-of-shards = 100
      remember-entities = on
      remember-entities-store = "eventsourced"

      # Passivation (stop idle actors after 2 minutes)
      passivate-idle-entity-after = 2m
    }

    # Downing strategy
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

    min-nr-of-members = 1
  }

  # Persistence configuration
  persistence {
    journal {
      plugin = "pekko.persistence.cassandra.journal"
      auto-start-journals = ["pekko.persistence.cassandra.journal"]
    }

    snapshot-store {
      plugin = "pekko.persistence.cassandra.snapshot"
      auto-start-snapshot-stores = ["pekko.persistence.cassandra.snapshot"]
    }

    # Cassandra plugin configuration
    cassandra {
      journal {
        keyspace = "market"
        table = "pekko_journal"
        metadata-table = "pekko_metadata"

        # Event serialization
        event-adapters {
          tagging = "com.example.sinkconnect.infrastructure.config.AlertEventAdapter"
        }

        event-adapter-bindings {
          "com.example.sinkconnect.domain.logic.alert.actor.AlertEvent" = tagging
        }

        # Performance tuning
        max-result-size = 50001
        target-partition-size = 500000
        replay-max-result-size = 50001
      }

      snapshot {
        keyspace = "market"
        table = "pekko_snapshot"
        metadata-table = "pekko_metadata"
      }

      # Query plugin
      query {
        refresh-interval = 3s
        max-buffer-size = 500
        max-result-size-query = 50001
      }

      # All Persistence IDs table configuration
      # Required for tracking all persistence IDs (used by cluster sharding remember-entities)
      events-by-tag {
        enabled = true
        pubsub-notification = on
      }
    }
  }

  # Logging
  loglevel = "INFO"
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"

  # Log dead letters
  log-dead-letters = 10
  log-dead-letters-during-shutdown = off

  # Remote configuration (for cluster)
  remote {
    artery {
      canonical {
        hostname = "127.0.0.1"
        port = 2551
      }
    }
  }
}

# Apache Pekko Management (for cluster formation)
pekko.management {
  http {
    hostname = "127.0.0.1"
    port = 8558
  }

  cluster.bootstrap {
    contact-point-discovery {
      service-name = "alert-system"
      discovery-method = pekko-dns
    }
  }
}

# DataStax Java Driver Configuration
# This is the correct way to configure authentication, keyspace, and connection settings
# for Apache Pekko Persistence Cassandra plugin
datastax-java-driver {
  basic {
    # Contact points - list of Cassandra nodes
    contact-points = ["127.0.0.1:9042"]

    # Session keyspace - default keyspace for connections
    session-keyspace = "market"

    # Load balancing policy - REQUIRED for proper operation
    load-balancing-policy {
      local-datacenter = "datacenter1"
    }

    # Request timeout
    request {
      timeout = 10 seconds
    }
  }

  advanced {
    # Authentication provider - use PlainTextAuthProvider for username/password auth
    auth-provider {
      class = PlainTextAuthProvider
      username = "market_user"
      password = "abc@1234"
    }

    # Connection pool settings
    connection {
      max-requests-per-connection = 1024
      pool {
        local.size = 4
        remote.size = 2
      }
    }

    # Reconnection policy
    reconnection-policy {
      class = ExponentialReconnectionPolicy
      base-delay = 1 second
      max-delay = 60 seconds
    }
  }
}