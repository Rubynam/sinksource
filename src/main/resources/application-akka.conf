# Akka Configuration for Alert System
# This file configures Akka Persistence with Cassandra plugin

akka {
  actor {
    provider = "cluster"

    # Serialization configuration
    serialization-bindings {
      "com.example.sinkconnect.domain.alert.actor.AlertEvent" = jackson-json
      "com.example.sinkconnect.domain.alert.actor.AlertCommand" = jackson-json
      "com.example.sinkconnect.domain.alert.actor.AlertState" = jackson-json
      "com.example.sinkconnect.domain.alert.actor.AlertManagerActor$Command" = jackson-json
    }

    # Allow Java serialization for some internal Akka messages
    allow-java-serialization = on
    warn-about-java-serializer-usage = off
  }

  # Cluster configuration
  cluster {
    seed-nodes = ["akka://AlertSystem@127.0.0.1:2551"]

    # Sharding configuration
    sharding {
      number-of-shards = 100
      remember-entities = on
      remember-entities-store = "eventsourced"

      # Passivation (stop idle actors after 2 minutes)
      passivate-idle-entity-after = 2m
    }

    # Downing strategy
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"

    min-nr-of-members = 1
  }

  # Persistence configuration
  persistence {
    journal {
      plugin = "akka.persistence.cassandra.journal"
      auto-start-journals = ["akka.persistence.cassandra.journal"]
    }

    snapshot-store {
      plugin = "akka.persistence.cassandra.snapshot"
      auto-start-snapshot-stores = ["akka.persistence.cassandra.snapshot"]
    }

    # Cassandra plugin configuration
    cassandra {
      journal {
        keyspace = "market"
        table = "akka_journal"
        metadata-table = "akka_metadata"

        # Event serialization
        event-adapters {
          tagging = "com.example.sinkconnect.infrastructure.config.AlertEventAdapter"
        }

        event-adapter-bindings {
          "com.example.sinkconnect.domain.alert.actor.AlertEvent" = tagging
        }

        # Connection settings
        contact-points = ["localhost"]
        port = 9042
        local-datacenter = "datacenter1"

        # Authentication (if required)
        authentication {
          username = "market_user"
          password = "abc@1234"
        }

        # Performance tuning
        max-result-size = 50001
        target-partition-size = 500000
        replay-max-result-size = 50001
      }

      snapshot {
        keyspace = "market"
        table = "akka_snapshot"
        metadata-table = "akka_metadata"

        # Connection settings (same as journal)
        contact-points = ["localhost"]
        port = 9042
        local-datacenter = "datacenter1"

        authentication {
          username = "market_user"
          password = "abc@1234"
        }
      }

      # Query plugin
      query {
        refresh-interval = 3s
        max-buffer-size = 500
        max-result-size-query = 50001
      }

      # Connection pool settings
      session {
        contact-points = ["localhost:9042"]
        keyspace = "market"
        local-datacenter = "datacenter1"

        credentials {
          username = "market_user"
          password = "abc@1234"
        }

        # Connection pooling
        connection {
          local-pool-size = 4
          remote-pool-size = 2
        }
      }
    }
  }

  # Logging
  loglevel = "INFO"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"

  # Log dead letters
  log-dead-letters = 10
  log-dead-letters-during-shutdown = off

  # Remote configuration (for cluster)
  remote {
    artery {
      canonical {
        hostname = "127.0.0.1"
        port = 2551
      }
    }
  }
}

# Akka Management (for cluster formation)
akka.management {
  http {
    hostname = "127.0.0.1"
    port = 8558
  }

  cluster.bootstrap {
    contact-point-discovery {
      service-name = "alert-system"
      discovery-method = akka-dns
    }
  }
}