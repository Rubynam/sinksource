spring:
  application:
    name: sink-connect

  # Cassandra/ScyllaDB Configuration
  cassandra:
    contact-points: ${SCYLLA_CONTACT_POINTS:localhost}
    port: ${SCYLLA_PORT:9042}
    keyspace-name: market
    local-datacenter: ${SCYLLA_DATACENTER:datacenter1}
    schema-action: none
    username: market_user
    password: abc@1234
    request:
      timeout: 30s
      consistency: quorum
    connection:
      connect-timeout: 10s
      init-query-timeout: 10s
    pool:
      idle-timeout: 60s
      heartbeat-interval: 30s

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: sink-connector-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        max.poll.records: 500
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        fetch.min.bytes: 1024
        fetch.max.wait.ms: 500
    listener:
      ack-mode: manual
      concurrency: 2
      poll-timeout: 3000

# Custom Application Configuration
sink-connector:
  # Kafka Topics
  topic: inbound-symbol-source

  # Apache Spark Configuration
  spark:
    enabled: ${SPARK_ENABLED:true}
    app-name: CryptoSinkConnector
    master: ${SPARK_MASTER:local[*]}
    executor:
      memory: 4g
      cores: 2
    driver:
      memory: 2g
    sql:
      shuffle-partitions: 10
    streaming:
      batch-interval: 10 seconds
      checkpoint-location: ${SPARK_CHECKPOINT_DIR:/tmp/spark-checkpoint}
      watermark-delay: 30 seconds
      window-duration: 1 minute
      write-mode: append

  # Retry Configuration
  retry:
    max-attempts: 3
    initial-backoff-ms: 1000
    max-backoff-ms: 30000
    backoff-multiplier: 2.0

  # ScyllaDB Write Configuration
  scylla:
    batch-size: 1000
    write-parallelism: 10
    write-consistency: QUORUM
    ttl:
      candles-1m: 7776000  # 90 days
      candles-aggregated: 31536000  # 1 year

# Logging Configuration
logging:
  level:
    root: INFO
    com.example.sinkconnect: DEBUG
    org.apache.spark: WARN
    org.apache.kafka: WARN
    com.datastax.oss.driver: WARN