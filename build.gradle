plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.9'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'org.graalvm.buildtools.native' version '0.10.6'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
description = 'sink-connect'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
    maven {
        url 'https://packages.confluent.io/maven/'
    }
}

configurations {
    all {
        exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
        exclude group: 'io.netty', module: 'netty-transport-classes-kqueue:4.1.130.Final'
    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-data-cassandra'
    implementation 'org.springframework.kafka:spring-kafka'

    // Apache Spark dependencies
    implementation('org.apache.spark:spark-core_2.13:4.0.0') {

        exclude group: 'log4j'
        exclude group: 'commons-logging'
    }

    implementation('org.apache.spark:spark-sql_2.13:4.0.0') {
        exclude group: 'log4j'
        exclude group: 'commons-logging'
    }
    // Logging
    implementation 'org.slf4j:slf4j-api'
    implementation 'ch.qos.logback:logback-classic'

    implementation 'org.apache.spark:spark-streaming_2.13:4.0.0'
    implementation 'org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.0'
    implementation 'org.apache.spark:spark-streaming-kafka-0-10_2.13:4.0.0'
    // Kafka Streams and KSQL
    implementation 'org.apache.kafka:kafka-streams'

    // Jackson for JSON processing
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
    implementation("io.reactivex.rxjava3:rxjava:3.1.12")

    // Akka dependencies
    implementation 'com.typesafe.akka:akka-actor-typed_2.13:2.8.5'
    implementation 'com.typesafe.akka:akka-persistence-typed_2.13:2.8.5'
    implementation 'com.typesafe.akka:akka-stream-kafka_2.13:4.0.2'
    implementation 'com.typesafe.akka:akka-stream_2.13:2.8.5'
    implementation 'com.typesafe.akka:akka-cluster-sharding-typed_2.13:2.8.5'
    implementation 'com.typesafe.akka:akka-persistence-cassandra_2.13:1.1.1'
    implementation 'com.typesafe.akka:akka-serialization-jackson_2.13:2.8.5'

    // Redis for distributed caching
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'io.lettuce:lettuce-core'

    // Validation
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // Retry support
    implementation 'org.springframework.retry:spring-retry'
    implementation 'org.springframework:spring-aspects'

    implementation 'jakarta.servlet:jakarta.servlet-api:5.0.0'
    compileOnly "io.netty:netty-all:4.2.7.Final"
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

def jvmArgs = [
        '--add-opens=java.base/java.lang.invoke=ALL-UNNAMED',
        '--add-opens=java.base/java.lang=ALL-UNNAMED',
        '--add-opens=java.base/java.util=ALL-UNNAMED',
        '--add-opens=java.base/java.nio=ALL-UNNAMED',
        '--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
        '--add-opens=java.base/sun.util.calendar=ALL-UNNAMED',
        '--add-opens=java.base/java.util.concurrent=ALL-UNNAMED',
        '--add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED',
        '--add-opens=java.base/java.util.concurrent.locks=ALL-UNNAMED'
]

bootRun {
    // Add individual JVM arguments
    jvmArgs += jvmArgs
}

tasks.withType(JavaExec) {
    jvmArgs += jvmArgs
}
